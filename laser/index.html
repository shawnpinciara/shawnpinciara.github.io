<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laser CNC 3018 Controller</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d; color: #e0e0e0;
      font-family: 'Courier New', monospace;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 16px; background: #111; border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
    }
    header h1 { font-size: 0.9rem; font-weight: 600; letter-spacing: 0.06em; color: #f90; }
    #status-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #444; flex-shrink: 0; transition: background 0.3s;
    }
    #status-dot.connected    { background: #0f0; box-shadow: 0 0 5px #0f0; }
    #status-dot.connecting   { background: #f90; box-shadow: 0 0 5px #f90; }
    #status-dot.disconnected { background: #f33; box-shadow: 0 0 5px #f33; }
    #status-text { font-size: 0.7rem; color: #666; }
    #pos-display { font-size: 0.7rem; color: #555; margin-left: 8px; }
    #pos-display span { color: #999; }
    #btn-connect {
      margin-left: auto; padding: 5px 13px;
      background: #1a1a1a; border: 1px solid #f90; color: #f90;
      border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.75rem;
    }
    #btn-connect:hover { background: #2a1a00; }

    /* ── 3-col layout ── */
    main { flex: 1; display: flex; overflow: hidden; }

    /* ── LEFT ── */
    #control-panel {
      width: 240px; flex-shrink: 0;
      display: flex; flex-direction: column;
      border-right: 1px solid #1a1a1a;
      overflow: hidden;
    }
    #control-top {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 18px; padding: 18px 14px;
      flex-shrink: 0;
    }
    #jog-grid {
      display: grid;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 5px;
    }
    .jog-btn {
      background: #181818; border: 1px solid #2a2a2a; border-radius: 6px;
      color: #bbb; font-size: 1.25rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, border-color 0.1s, color 0.1s; user-select: none;
    }
    .jog-btn:hover:not(:disabled)  { background: #242424; border-color: #f90; color: #f90; }
    .jog-btn:active:not(:disabled) { background: #302000; }
    .jog-btn:disabled              { opacity: 0.2; cursor: not-allowed; }
    #btn-set-home {
      background: #181818; border: 1px solid #2a2a2a; border-radius: 6px;
      color: #888; font-size: 0.5rem; letter-spacing: 0.05em; cursor: pointer;
      display: flex; align-items: center; justify-content: center; text-align: center;
      line-height: 1.3; padding: 4px;
      transition: background 0.1s, border-color 0.1s, color 0.1s; user-select: none;
    }
    #btn-set-home:hover:not(:disabled) { background: #1a1200; border-color: #f90; color: #f90; }
    #btn-set-home:disabled { opacity: 0.2; cursor: not-allowed; }

    #step-row { display: flex; align-items: center; gap: 7px; font-size: 0.7rem; }
    #step-row label { color: #666; }
    #step-select {
      background: #181818; border: 1px solid #2a2a2a; color: #bbb;
      border-radius: 4px; padding: 3px 6px; font-family: inherit; font-size: 0.7rem; cursor: pointer;
    }
    #laser-controls { display: flex; flex-direction: column; gap: 6px; width: 100%; }
    #laser-controls > label { font-size: 0.62rem; color: #444; letter-spacing: 0.07em; }
    #laser-power-row { display: flex; align-items: center; gap: 7px; }
    #laser-power { flex: 1; accent-color: #f90; }
    #power-val { font-size: 0.7rem; color: #f90; width: 28px; text-align: right; }
    #laser-btn-row { display: flex; gap: 6px; }
    .laser-btn {
      flex: 1; padding: 6px; background: #181818; border: 1px solid #2a2a2a;
      border-radius: 4px; color: #aaa; font-family: inherit; font-size: 0.7rem;
      cursor: pointer; transition: background 0.1s;
    }
    .laser-btn:hover:not(:disabled) { background: #222; border-color: #f90; color: #f90; }
    .laser-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    #quick-row { display: flex; gap: 5px; width: 100%; }
    .quick-btn {
      flex: 1; padding: 5px 3px; background: #181818; border: 1px solid #2a2a2a;
      border-radius: 4px; color: #666; font-family: inherit; font-size: 0.62rem;
      cursor: pointer; transition: background 0.1s;
    }
    .quick-btn:hover:not(:disabled) { background: #222; color: #bbb; }
    .quick-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    /* ── CENTER ── */
    #center-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid #1a1a1a; }
    #tab-bar { display: flex; background: #0f0f0f; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
    .tab-btn {
      padding: 8px 18px; background: transparent; border: none; border-bottom: 2px solid transparent;
      color: #555; font-family: inherit; font-size: 0.72rem; cursor: pointer;
      transition: color 0.12s, border-color 0.12s; letter-spacing: 0.04em;
    }
    .tab-btn.active { color: #f90; border-bottom-color: #f90; }
    .tab-btn:hover:not(.active) { color: #aaa; }
    .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-content.active { display: flex; }

    /* G-code tab */
    #gcode-toolbar {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 10px; background: #0f0f0f; border-bottom: 1px solid #1a1a1a; flex-shrink: 0;
    }
    #gcode-filename { font-size: 0.68rem; color: #555; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #btn-load-gcode {
      padding: 4px 10px; background: #181818; border: 1px solid #2a2a2a; color: #999;
      border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.68rem; flex-shrink: 0;
    }
    #btn-load-gcode:hover { background: #222; color: #ddd; }
    .run-btn {
      padding: 4px 11px; background: #181818; border: 1px solid #2a2a2a;
      border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.68rem; flex-shrink: 0;
    }
    .run-btn:disabled { opacity: 0.22; cursor: not-allowed; }
    #btn-run   { color: #4e4; border-color: #153015; }
    #btn-run:hover:not(:disabled) { background: #0a1a0a; border-color: #4e4; }
    #btn-pause { color: #fa0; border-color: #2e2000; }
    #btn-pause:hover:not(:disabled) { background: #181000; border-color: #fa0; }
    #btn-stop  { color: #f55; border-color: #2e0a0a; }
    #btn-stop:hover:not(:disabled) { background: #180808; border-color: #f55; }
    #gcode-progress-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 10px; background: #0a0a0a; border-bottom: 1px solid #161616; flex-shrink: 0;
    }
    #progress-bar-track { flex: 1; height: 3px; background: #1e1e1e; border-radius: 2px; overflow: hidden; }
    #progress-bar-fill  { height: 100%; background: #f90; width: 0%; border-radius: 2px; transition: width 0.2s; }
    #progress-label { font-size: 0.62rem; color: #444; white-space: nowrap; min-width: 90px; text-align: right; }
    #gcode-viewer {
      flex: 1; overflow-y: auto; padding: 6px 0;
      background: #080808; font-size: 0.73rem; line-height: 1.5;
    }
    #gcode-viewer::-webkit-scrollbar { width: 5px; }
    #gcode-viewer::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
    #gcode-viewer:empty::after {
      content: 'Load a G-code file or generate from SVG';
      display: block; text-align: center; margin-top: 40px; color: #252525; font-size: 0.78rem;
    }
    .gc-line { display: flex; gap: 0; padding: 0 8px; min-height: 1.5em; }
    .gc-line:hover { background: #101010; }
    .gc-line.active { background: #1a1200; border-left: 2px solid #f90; padding-left: 6px; }
    .gc-line.done   { opacity: 0.3; }
    .gc-line.error  { background: #160606; border-left: 2px solid #f55; padding-left: 6px; }
    .gc-num { color: #272727; min-width: 42px; text-align: right; padding-right: 12px; user-select: none; flex-shrink: 0; }
    .gc-line.active .gc-num { color: #f90; }
    .gc-cmd     { color: #d0d0d0; }
    .gc-comment { color: #2e4a2e; }
    .gc-skip    { color: #1e1e1e; }

    /* SVG tab */
    #svg-toolbar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 7px 10px; background: #0f0f0f; border-bottom: 1px solid #1a1a1a; flex-shrink: 0;
    }
    #btn-load-svg {
      padding: 4px 10px; background: #181818; border: 1px solid #2a2a2a; color: #999;
      border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.68rem; flex-shrink: 0;
    }
    #btn-load-svg:hover { background: #222; color: #ddd; }
    #svg-filename { font-size: 0.68rem; color: #555; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .svg-param { display: flex; align-items: center; gap: 5px; font-size: 0.64rem; color: #555; }
    .svg-param label { white-space: nowrap; }
    .svg-param input[type=number] {
      width: 52px; background: #181818; border: 1px solid #252525; color: #bbb;
      border-radius: 3px; padding: 2px 5px; font-family: inherit; font-size: 0.64rem; text-align: right;
    }
    #btn-svg-generate {
      padding: 4px 12px; background: #181818; border: 1px solid #2a2a2a; color: #888;
      border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.68rem; flex-shrink: 0;
    }
    #btn-svg-generate:hover:not(:disabled) { background: #222; color: #ccc; }
    #btn-svg-generate:disabled { opacity: 0.3; cursor: not-allowed; }

    /* SVG job control — hidden until G-code is generated */
    #svg-job-controls { display: none; align-items: center; gap: 6px; }
    #svg-job-controls.visible { display: flex; }
    #btn-svg-run   { color: #4af; border-color: #0a2a3a; }
    #btn-svg-run:hover:not(:disabled) { background: #04141e; border-color: #4af; }
    #btn-svg-pause { color: #fa0; border-color: #2e2000; }
    #btn-svg-pause:hover:not(:disabled) { background: #181000; border-color: #fa0; }
    #btn-svg-stop  { color: #f55; border-color: #2e0a0a; }
    #btn-svg-stop:hover:not(:disabled)  { background: #180808; border-color: #f55; }

    /* SVG canvas area with rulers */
    #svg-canvas-area {
      flex: 1; display: grid;
      grid-template-columns: 28px 1fr;
      grid-template-rows: 28px 1fr;
      overflow: hidden; background: #060606;
    }
    #ruler-corner { background: #0a0a0a; border-right: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; }
    #ruler-h { background: #0a0a0a; border-bottom: 1px solid #1a1a1a; overflow: hidden; }
    #ruler-v { background: #0a0a0a; border-right: 1px solid #1a1a1a; overflow: hidden; }
    #svg-canvas-wrap {
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    #svg-canvas-wrap:empty::after {
      content: 'Drag an SVG file here';
      color: #252525; font-size: 0.8rem;
    }
    #svg-bg { position: absolute; max-width: 100%; max-height: 100%; opacity: 0.5; pointer-events: none; }
    #svg-overlay { position: absolute; pointer-events: none; }

    /* ── RIGHT: console ── */
    #console-panel { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; }
    #console-output {
      flex: 1; overflow-y: auto; padding: 8px 10px;
      font-size: 0.71rem; line-height: 1.6; background: #070707;
    }
    #console-output::-webkit-scrollbar { width: 5px; }
    #console-output::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 3px; }
    .log-line { display: flex; gap: 7px; }
    .log-time { color: #2e2e2e; flex-shrink: 0; }
    .log-rx   { color: #4a9fdf; }
    .log-tx   { color: #f90; }
    .log-sys  { color: #555; font-style: italic; }
    .log-err  { color: #f44; }
    #console-input-row { display: flex; border-top: 1px solid #181818; background: #0e0e0e; }
    #console-prompt { padding: 8px 9px; color: #f90; font-size: 0.8rem; user-select: none; }
    #console-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #ddd; font-family: inherit; font-size: 0.75rem; padding: 8px 0;
    }
    #btn-send {
      padding: 0 13px; background: transparent; border: none;
      border-left: 1px solid #181818; color: #f90;
      cursor: pointer; font-family: inherit; font-size: 0.72rem;
    }
    #btn-send:hover { background: #1a1200; }

    /* ── Color profiles section ── */
    #profiles-section {
      flex: 1; border-top: 1px solid #1a1a1a;
      display: flex; flex-direction: column; min-height: 0;
    }
    #profiles-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 9px; background: #0d0d0d; border-bottom: 1px solid #161616; flex-shrink: 0;
    }
    #profiles-header > span { font-size: 0.6rem; color: #4a4a4a; letter-spacing: 0.1em; }
    #profiles-header > div { display: flex; gap: 5px; }
    .ph-btn {
      padding: 2px 8px; background: #181818; border: 1px solid #2a2a2a;
      color: #666; border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 0.62rem;
      transition: color 0.1s;
    }
    .ph-btn:hover { color: #bbb; background: #222; }
    #profiles-list { overflow-y: auto; flex: 1; padding: 3px 5px; }
    #profiles-list::-webkit-scrollbar { width: 4px; }
    #profiles-list::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }
    .profile-row {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 2px; border-bottom: 1px solid #131313;
    }
    .profile-swatch {
      width: 18px; height: 18px; border-radius: 3px; border: 1px solid #333;
      cursor: pointer; flex-shrink: 0; transition: transform 0.1s;
    }
    .profile-swatch:hover { transform: scale(1.15); border-color: #666; }
    .prof-lbl { font-size: 0.56rem; color: #3a3a3a; white-space: nowrap; flex-shrink: 0; }
    .prof-inp {
      width: 42px; background: #111; border: 1px solid #1e1e1e; color: #bbb;
      border-radius: 3px; padding: 2px 4px; font-family: inherit; font-size: 0.62rem;
      text-align: right; flex-shrink: 0;
    }
    .prof-inp:focus { outline: none; border-color: #f90; }
    .profile-del {
      margin-left: auto; flex-shrink: 0; padding: 0 5px; height: 16px;
      background: transparent; border: 1px solid #222; color: #333;
      border-radius: 3px; cursor: pointer; font-size: 0.65rem; line-height: 1;
      transition: color 0.1s, border-color 0.1s;
    }
    .profile-del:hover { color: #f55; border-color: #f55; }
    #btn-add-profile {
      flex-shrink: 0; margin: 4px 7px;
      padding: 4px 0; background: transparent; border: 1px dashed #242424;
      color: #444; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.68rem;
      transition: color 0.1s, border-color 0.1s;
    }
    #btn-add-profile:hover { color: #888; border-color: #555; }

    /* ── Color picker popup ── */
    #color-picker-popup {
      display: none; position: fixed; z-index: 300;
      background: #1c1c1c; border: 1px solid #333; border-radius: 6px;
      padding: 9px; box-shadow: 0 4px 24px rgba(0,0,0,0.8);
      flex-direction: column; gap: 7px; width: 172px;
    }
    #color-picker-popup.open { display: flex; }
    #cp-native { width: 100%; height: 30px; border: none; border-radius: 3px; cursor: pointer; padding: 0; background: none; }
    .cp-row { display: flex; align-items: center; gap: 5px; font-size: 0.62rem; color: #555; }
    .cp-row input[type=text] {
      flex: 1; background: #111; border: 1px solid #2a2a2a; color: #ddd;
      border-radius: 3px; padding: 2px 5px; font-family: monospace; font-size: 0.7rem;
    }
    .cp-row input[type=text]:focus, .cp-row input[type=number]:focus { outline: none; border-color: #f90; }
    .cp-row input[type=number] {
      width: 38px; background: #111; border: 1px solid #2a2a2a; color: #ddd;
      border-radius: 3px; padding: 2px 3px; font-family: monospace; font-size: 0.65rem; text-align: right;
    }

    /* drop overlay */
    #drop-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); border: 2px dashed #f90; z-index: 100;
      align-items: center; justify-content: center; font-size: 1.1rem; color: #f90; pointer-events: none;
    }
    #drop-overlay.visible { display: flex; }

    /* disabled when not connected */
    body.not-connected #control-panel .jog-btn,
    body.not-connected #btn-set-home,
    body.not-connected .laser-btn,
    body.not-connected .quick-btn,
    body.not-connected #btn-send,
    body.not-connected #btn-run,
    body.not-connected #btn-pause,
    body.not-connected #btn-stop,
    body.not-connected #btn-svg-run,
    body.not-connected #btn-svg-pause,
    body.not-connected #btn-svg-stop {
      pointer-events: none; opacity: 0.15;
    }
  </style>
</head>
<body class="not-connected">

<div id="drop-overlay">Drop file here (SVG or G-code)</div>

<header>
  <span id="status-dot"></span>
  <span id="status-text">Not connected</span>
  <h1>LASER CNC 3018</h1>
  <span id="pos-display">X <span id="px">0.000</span>  Y <span id="py">0.000</span></span>
  <button id="btn-connect">Connect</button>
</header>

<main>
  <!-- LEFT -->
  <section id="control-panel">
    <div id="control-top">
      <div id="jog-grid">
        <div></div>
        <button class="jog-btn" id="btn-y-plus"  title="Y+">&#9650;</button>
        <div></div>
        <button class="jog-btn" id="btn-x-minus" title="X-">&#9664;</button>
        <button id="btn-set-home" title="Set current position as Home (G92 X0 Y0)">SET<br>HOME</button>
        <button class="jog-btn" id="btn-x-plus"  title="X+">&#9654;</button>
        <div></div>
        <button class="jog-btn" id="btn-y-minus" title="Y-">&#9660;</button>
        <div></div>
      </div>
      <div id="step-row">
        <label>Step:</label>
        <select id="step-select">
          <option value="0.1">0.1 mm</option>
          <option value="1" selected>1 mm</option>
          <option value="5">5 mm</option>
          <option value="10">10 mm</option>
        </select>
      </div>
      <div id="laser-controls">
        <label>LASER POWER</label>
        <div id="laser-power-row">
          <input type="range" id="laser-power" min="0" max="255" value="0">
          <span id="power-val">0</span>
        </div>
        <div id="laser-btn-row">
          <button class="laser-btn" id="btn-laser-on">ON</button>
          <button class="laser-btn" id="btn-laser-off">OFF</button>
        </div>
      </div>
      <div id="quick-row">
        <button class="quick-btn" id="btn-unlock">Unlock</button>
        <button class="quick-btn" id="btn-home">Home</button>
        <button class="quick-btn" id="btn-reset">Reset</button>
      </div>
    </div>

    <!-- Color profiles (bottom of left panel) -->
    <div id="profiles-section">
      <div id="profiles-header">
        <span>COLOR PROFILES</span>
        <div>
          <input type="file" id="file-input-profiles" accept=".json" style="display:none">
          <button class="ph-btn" id="btn-load-profiles">Load</button>
          <button class="ph-btn" id="btn-save-profiles">Save</button>
        </div>
      </div>
      <div id="profiles-list"></div>
      <button id="btn-add-profile">+ Add profile</button>
    </div>
  </section>

  <!-- CENTER -->
  <section id="center-panel">
    <div id="tab-bar">
      <button class="tab-btn active" data-tab="gcode">G-CODE</button>
      <button class="tab-btn" data-tab="svg">SVG → G-CODE</button>
    </div>

    <!-- G-code tab -->
    <div class="tab-content active" id="tab-gcode">
      <div id="gcode-toolbar">
        <button id="btn-load-gcode">&#128196; Load .gcode</button>
        <input type="file" id="file-input-gcode" accept=".gcode,.nc,.gc,.cnc,.txt" style="display:none">
        <span id="gcode-filename">No file</span>
        <button class="run-btn" id="btn-run"   disabled>&#9654; Start</button>
        <button class="run-btn" id="btn-pause" disabled>&#9646;&#9646; Pause</button>
        <button class="run-btn" id="btn-stop"  disabled>&#9632; Stop</button>
      </div>
      <div id="gcode-progress-row">
        <div id="progress-bar-track"><div id="progress-bar-fill"></div></div>
        <span id="progress-label">— / —</span>
      </div>
      <div id="gcode-viewer"></div>
    </div>

    <!-- SVG tab -->
    <div class="tab-content" id="tab-svg">
      <div id="svg-toolbar">
        <button id="btn-load-svg">&#128444; Load SVG</button>
        <input type="file" id="file-input-svg" accept=".svg" style="display:none">
        <span id="svg-filename">No SVG file</span>
        <div class="svg-param"><label>Engrave speed</label>
          <input type="number" id="p-feed"  value="800"  min="100" max="5000"> mm/min</div>
        <div class="svg-param"><label>Rapid speed</label>
          <input type="number" id="p-rapid" value="3000" min="500" max="8000"> mm/min</div>
        <div class="svg-param"><label>Power S</label>
          <input type="number" id="p-power" value="200"  min="1"   max="255"></div>
        <div class="svg-param"><label>Scale</label>
          <input type="number" id="p-scale" value="1"    min="0.01" max="100" step="0.01"> ×</div>
        <div class="svg-param"><label>Sample step</label>
          <input type="number" id="p-step"  value="0.3"  min="0.05" max="2"   step="0.05"> mm</div>
        <button id="btn-svg-generate" disabled>&#9656; Generate G-code</button>

        <div id="svg-job-controls">
          <button class="run-btn" id="btn-svg-run"  >&#9654; Start</button>
          <button class="run-btn" id="btn-svg-pause" disabled>&#9646;&#9646; Pause</button>
          <button class="run-btn" id="btn-svg-stop"  disabled>&#9632; Stop</button>
        </div>
      </div>

      <div id="svg-canvas-area">
        <div id="ruler-corner"></div>
        <canvas id="ruler-h"></canvas>
        <canvas id="ruler-v"></canvas>
        <div id="svg-canvas-wrap">
          <img id="svg-bg" style="display:none" alt="">
          <canvas id="svg-overlay"></canvas>
        </div>
      </div>
    </div>
  </section>

  <!-- RIGHT: console -->
  <section id="console-panel">
    <div id="console-output"></div>
    <div id="console-input-row">
      <span id="console-prompt">&gt;</span>
      <input id="console-input" type="text" placeholder="G-code command..." autocomplete="off" spellcheck="false">
      <button id="btn-send">SEND</button>
    </div>
  </section>
</main>

<!-- Color picker popup (global, positioned via JS) -->
<div id="color-picker-popup">
  <input type="color" id="cp-native">
  <div class="cp-row"><span>#</span><input type="text" id="cp-hex" maxlength="6" placeholder="FF0000"></div>
  <div class="cp-row">
    <input type="number" id="cp-r" min="0" max="255" placeholder="R">
    <input type="number" id="cp-g" min="0" max="255" placeholder="G">
    <input type="number" id="cp-b" min="0" max="255" placeholder="B">
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// SERIAL STATE
// ═══════════════════════════════════════════════════════════
let port = null, writer = null, reader = null, readLoopActive = false;
let okResolve = null, okReject = null;

// ═══════════════════════════════════════════════════════════
// MACHINE POSITION (mm, machine coords)
// ═══════════════════════════════════════════════════════════
const pos = { x: 0, y: 0 };
let posMode = 'abs';

function updatePosDisplay() {
  document.getElementById('px').textContent = pos.x.toFixed(3);
  document.getElementById('py').textContent = pos.y.toFixed(3);
  drawOverlay();
}

function parseGrblStatus(line) {
  const m = line.match(/MPos:([-\d.]+),([-\d.]+)/);
  if (m) { pos.x = parseFloat(m[1]); pos.y = parseFloat(m[2]); updatePosDisplay(); }
}

// trackSentGcode defined later (includes laser on/off tracking)

let statusPoll = null;
function startStatusPoll() {
  clearInterval(statusPoll);
  statusPoll = setInterval(() => { if (writer) sendRaw('?'); }, 1500);
}
function stopStatusPoll() { clearInterval(statusPoll); statusPoll = null; }

// ═══════════════════════════════════════════════════════════
// GCODE JOB STATE
// ═══════════════════════════════════════════════════════════
let gcLines = [], gcFiltered = [];
let jobActive = false, jobPaused = false, jobIdx = 0;
const cmdHistory = []; let histIdx = -1;

// ═══════════════════════════════════════════════════════════
// DOM REFS
// ═══════════════════════════════════════════════════════════
const statusDot    = document.getElementById('status-dot');
const statusText_  = document.getElementById('status-text');
const btnConnect   = document.getElementById('btn-connect');
const consoleOut   = document.getElementById('console-output');
const consoleIn    = document.getElementById('console-input');
const gcViewer     = document.getElementById('gcode-viewer');
const gcFilename   = document.getElementById('gcode-filename');
const progressFill = document.getElementById('progress-bar-fill');
const progressLbl  = document.getElementById('progress-label');
const btnRun       = document.getElementById('btn-run');
const btnPause     = document.getElementById('btn-pause');
const btnStop      = document.getElementById('btn-stop');
const svgOverlay   = document.getElementById('svg-overlay');
const svgBg        = document.getElementById('svg-bg');
const rulerH       = document.getElementById('ruler-h');
const rulerV       = document.getElementById('ruler-v');

// ═══════════════════════════════════════════════════════════
// LOGGING
// ═══════════════════════════════════════════════════════════
function log(text, type = 'sys') {
  const ts = new Date().toTimeString().slice(0,8);
  const d = document.createElement('div');
  d.className = 'log-line';
  d.innerHTML = `<span class="log-time">${ts}</span><span class="log-${type}">${esc(text)}</span>`;
  consoleOut.appendChild(d);
  consoleOut.scrollTop = consoleOut.scrollHeight;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════════════════════
// SERIAL
// ═══════════════════════════════════════════════════════════
async function connect() {
  if (!('serial' in navigator)) { log('Web Serial not supported. Use Chrome/Edge.','err'); return; }
  try {
    setStatus('connecting');
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    writer = port.writable.getWriter();
    reader = port.readable.getReader();
    setStatus('connected');
    document.body.classList.remove('not-connected');
    btnConnect.textContent = 'Disconnect';
    log('Serial port open — 115200 baud.','sys');
    readLoopActive = true; readLoop(); startStatusPoll();
    await sendRaw('\x18'); await delay(500); await sendRaw('$X\n');
  } catch(err) {
    setStatus('disconnected');
    if (err.name !== 'NotSelectedError') log(`Error: ${err.message}`,'err');
  }
}

async function disconnect() {
  abortJob(); stopStatusPoll(); readLoopActive = false;
  try { reader?.releaseLock(); } catch(_){}
  try { writer?.releaseLock(); } catch(_){}
  try { await port?.close(); }  catch(_){}
  port = writer = reader = null;
  setStatus('disconnected');
  document.body.classList.add('not-connected');
  btnConnect.textContent = 'Connect';
  log('Disconnected.','sys');
}

async function readLoop() {
  let buf = '';
  while (readLoopActive) {
    try {
      const { value, done } = await reader.read();
      if (done) break;
      buf += new TextDecoder().decode(value);
      const lines = buf.split('\n'); buf = lines.pop();
      for (const raw of lines) {
        const l = raw.trim(); if (!l) continue;
        if (l.startsWith('<')) { parseGrblStatus(l); continue; }
        log(l, 'rx'); handleOk(l);
      }
    } catch(err) {
      if (readLoopActive) log(`Read error: ${err.message}`,'err');
      break;
    }
  }
}

function handleOk(line) {
  if (!okResolve) return;
  const l = line.toLowerCase();
  if (l === 'ok') { const r=okResolve; okResolve=okReject=null; r(true); }
  else if (l.startsWith('error:') || l.startsWith('alarm:')) {
    const r=okReject; okResolve=okReject=null; r(new Error(line));
  }
}

function waitForOk(ms=30000) {
  return new Promise((res,rej) => {
    okResolve=res; okReject=rej;
    setTimeout(()=>{ if(okReject){ okReject(new Error('Timeout')); okResolve=okReject=null; } }, ms);
  });
}

async function sendRaw(text) {
  if (!writer) return;
  try { await writer.write(new TextEncoder().encode(text)); }
  catch(err) { log(`Send error: ${err.message}`,'err'); }
}

async function sendCmd(cmd) {
  if (!writer) return;
  log(cmd,'tx'); trackSentGcode(cmd); await sendRaw(cmd+'\n');
}

function setStatus(s) {
  statusDot.className = s;
  statusText_.textContent={connecting:'Connecting...',connected:'Connected',disconnected:'Not connected'}[s]??s;
}
function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

// ═══════════════════════════════════════════════════════════
// JOG
// ═══════════════════════════════════════════════════════════
function getStep() { return parseFloat(document.getElementById('step-select').value); }
function jog(axis, dir) {
  const d = dir * getStep();
  sendCmd(`G91\nG0 ${axis}${d>0?'+':''}${d} F3000\nG90`);
}
document.getElementById('btn-y-plus') .addEventListener('click', ()=>jog('Y', 1));
document.getElementById('btn-y-minus').addEventListener('click', ()=>jog('Y',-1));
document.getElementById('btn-x-plus') .addEventListener('click', ()=>jog('X', 1));
document.getElementById('btn-x-minus').addEventListener('click', ()=>jog('X',-1));
document.addEventListener('keydown', e => {
  if (document.activeElement === consoleIn) return;
  const m={ArrowUp:['Y',1],ArrowDown:['Y',-1],ArrowRight:['X',1],ArrowLeft:['X',-1]}[e.key];
  if (m) { e.preventDefault(); jog(m[0],m[1]); }
});
document.getElementById('btn-set-home').addEventListener('click', async () => {
  await sendCmd('G92 X0 Y0');
  pos.x=0; pos.y=0; updatePosDisplay();
  log('Home set (G92 X0 Y0).','sys');
});

// ═══════════════════════════════════════════════════════════
// LASER PWM
// ═══════════════════════════════════════════════════════════
document.getElementById('laser-power').addEventListener('input', function(){
  document.getElementById('power-val').textContent=this.value;
});
document.getElementById('btn-laser-on') .addEventListener('click',()=>sendCmd(`M3 S${document.getElementById('laser-power').value}`));
document.getElementById('btn-laser-off').addEventListener('click',()=>sendCmd('M5'));

// ═══════════════════════════════════════════════════════════
// QUICK ACTIONS
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-unlock').addEventListener('click',()=>sendCmd('$X'));
document.getElementById('btn-home')  .addEventListener('click',()=>sendCmd('$H'));
document.getElementById('btn-reset') .addEventListener('click',async()=>{ await sendRaw('\x18'); log('Soft reset.','sys'); });

// ═══════════════════════════════════════════════════════════
// CONSOLE
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-send').addEventListener('click', submitConsole);
consoleIn.addEventListener('keydown', e=>{
  if (e.key==='Enter') { submitConsole(); return; }
  if (e.key==='ArrowUp') {
    e.preventDefault();
    if (histIdx<cmdHistory.length-1) consoleIn.value=cmdHistory[cmdHistory.length-1-(++histIdx)];
  } else if (e.key==='ArrowDown') {
    e.preventDefault();
    if (histIdx>0) consoleIn.value=cmdHistory[cmdHistory.length-1-(--histIdx)];
    else { histIdx=-1; consoleIn.value=''; }
  }
});
function submitConsole() {
  const cmd=consoleIn.value.trim(); if(!cmd) return;
  cmdHistory.push(cmd); histIdx=-1; consoleIn.value='';
  sendCmd(cmd);
}

// ═══════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab==='svg') setTimeout(()=>{ resizeCanvas(); drawAll(); },50);
  });
});

// ═══════════════════════════════════════════════════════════
// G-CODE FILE
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-load-gcode').addEventListener('click',()=>document.getElementById('file-input-gcode').click());
document.getElementById('file-input-gcode').addEventListener('change',e=>{
  const f=e.target.files[0]; if(f) { const fr=new FileReader(); fr.onload=ev=>parseAndRenderGcode(ev.target.result,f.name); fr.readAsText(f); } e.target.value='';
});

function parseAndRenderGcode(text, name, switchTab = true) {
  abortJob();
  gcLines=text.split('\n'); gcFiltered=[];
  gcViewer.innerHTML='';
  gcLines.forEach((raw,i)=>{
    const stripped=raw.replace(/\(.*?\)/g,'').replace(/;.*$/,'').trim();
    const isBlank=stripped==='';
    const isComment=raw.trim().startsWith(';')||raw.trim().startsWith('(');
    const row=document.createElement('div');
    row.className='gc-line'+(isBlank||isComment?' gc-skip':'');
    row.dataset.lineIdx=i;
    const ns=document.createElement('span'); ns.className='gc-num'; ns.textContent=i+1;
    const cs=document.createElement('span');
    if (isBlank)       { cs.className='gc-skip'; }
    else if (isComment){ cs.className='gc-comment'; cs.textContent=raw.trimEnd(); }
    else               { cs.className='gc-cmd'; cs.textContent=raw.trimEnd(); gcFiltered.push({domIdx:i,text:stripped}); }
    row.append(ns,cs); gcViewer.appendChild(row);
  });
  gcFilename.textContent=`${name}  (${gcFiltered.length} lines)`;
  log(`G-code loaded: ${name} — ${gcFiltered.length} commands.`,'sys');
  updateProgress(0,gcFiltered.length);
  btnRun.disabled=gcFiltered.length===0; btnPause.disabled=btnStop.disabled=true;
  if (switchTab) document.querySelector('[data-tab="gcode"]').click();
}

// ═══════════════════════════════════════════════════════════
// JOB RUNNER
// ═══════════════════════════════════════════════════════════
const btnSvgRun   = document.getElementById('btn-svg-run');
const btnSvgPause = document.getElementById('btn-svg-pause');
const btnSvgStop  = document.getElementById('btn-svg-stop');
const svgJobCtrl  = document.getElementById('svg-job-controls');

function setJobRunning(running) {
  // G-code tab buttons
  btnRun.disabled   = running;
  btnPause.disabled = !running;
  btnStop.disabled  = !running;
  // SVG tab buttons
  btnSvgRun.disabled   = running;
  btnSvgPause.disabled = !running;
  btnSvgStop.disabled  = !running;
}

async function startJob() {
  if (!writer || gcFiltered.length===0) return;
  jobActive=true; jobPaused=false; jobIdx=0;
  setJobRunning(true);
  document.querySelectorAll('.gc-line').forEach(el=>el.classList.remove('active','done','error'));
  log(`Starting job: ${gcFiltered.length} commands.`,'sys');

  while (jobActive && jobIdx<gcFiltered.length) {
    while (jobPaused && jobActive) await delay(100);
    if (!jobActive) break;
    const {domIdx,text}=gcFiltered[jobIdx];
    const row=gcViewer.querySelector(`[data-line-idx="${domIdx}"]`);
    document.querySelectorAll('.gc-line.active').forEach(el=>el.classList.remove('active'));
    if (row) { row.classList.add('active'); row.scrollIntoView({block:'nearest',behavior:'smooth'}); }
    updateProgress(jobIdx,gcFiltered.length);
    log(text,'tx'); trackSentGcode(text); await sendRaw(text+'\n');
    try {
      await waitForOk();
      if (row) { row.classList.remove('active'); row.classList.add('done'); }
    } catch(err) {
      if (row) { row.classList.remove('active'); row.classList.add('error'); }
      log(`Error at line ${domIdx+1}: ${err.message}`,'err'); break;
    }
    jobIdx++;
  }

  const done=jobActive&&jobIdx>=gcFiltered.length;
  jobActive=false; jobPaused=false;
  setJobRunning(false);
  syncPauseLabel();
  if (done) { updateProgress(gcFiltered.length,gcFiltered.length); log('Job complete.','sys'); }
  else log('Job aborted.','sys');
}

function pauseJob() {
  if (!jobActive) return;
  jobPaused=!jobPaused;
  syncPauseLabel();
  log(jobPaused?'Paused.':'Resumed.','sys');
}

function syncPauseLabel() {
  const label = jobPaused ? '▶ Resume' : '⏸ Pause';
  btnPause.textContent    = label;
  btnSvgPause.textContent = label;
}

function abortJob() {
  jobActive=false; jobPaused=false;
  if (okReject) { okReject(new Error('Cancelled')); okResolve=okReject=null; }
  setJobRunning(false);
  syncPauseLabel();
}

btnRun    .addEventListener('click', startJob);
btnPause  .addEventListener('click', pauseJob);
btnStop   .addEventListener('click', abortJob);
btnSvgRun .addEventListener('click', startJob);
btnSvgPause.addEventListener('click', pauseJob);
btnSvgStop .addEventListener('click', abortJob);

function updateProgress(cur,tot) {
  const pct=tot>0?Math.round(cur/tot*100):0;
  progressFill.style.width=pct+'%';
  progressLbl.textContent=tot>0?`${cur} / ${tot}  (${pct}%)`:'— / —';
}

// ═══════════════════════════════════════════════════════════
// SVG LOAD & DIMENSIONS
// ═══════════════════════════════════════════════════════════
let svgDoc     = null;
let svgW_mm    = 0;
let svgH_mm    = 0;
let svgScalePx = 1;
let canvasW    = 0;
let canvasH    = 0;
let previewSegs = [];

// true while job is running — used to switch dot style
let laserOn = false; // tracks M3/M5 from sent gcode

document.getElementById('btn-load-svg').addEventListener('click',()=>document.getElementById('file-input-svg').click());
document.getElementById('file-input-svg').addEventListener('change',e=>{
  const f=e.target.files[0]; if(f){const fr=new FileReader();fr.onload=ev=>loadSvgText(ev.target.result,f.name);fr.readAsText(f);} e.target.value='';
});

function loadSvgText(text, name) {
  const parser=new DOMParser();
  svgDoc=parser.parseFromString(text,'image/svg+xml');
  const svgEl=svgDoc.querySelector('svg');
  if (!svgEl) { log('Invalid SVG.','err'); return; }

  const vb=svgEl.getAttribute('viewBox');
  let vbW=100, vbH=100;
  if (vb) { const p=vb.trim().split(/[\s,]+/).map(Number); vbW=p[2]; vbH=p[3]; }

  function parseDim(attr) {
    if (!attr) return null;
    const m=attr.match(/^([\d.]+)\s*(mm|px|in|cm|pt|pc)?$/);
    if (!m) return null;
    const v=parseFloat(m[1]), u=m[2]||'px';
    return v*({mm:1,px:25.4/96,in:25.4,cm:10,pt:25.4/72,pc:25.4/6}[u]||1);
  }

  const wMm=parseDim(svgEl.getAttribute('width'));
  const hMm=parseDim(svgEl.getAttribute('height'));
  svgW_mm = wMm||vbW; svgH_mm = hMm||vbH;

  const blob=new Blob([text],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  svgBg.onload=()=>{ URL.revokeObjectURL(url); resizeCanvas(); drawAll(); };
  svgBg.src=url; svgBg.style.display='';

  // Hide job controls until G-code is generated
  svgJobCtrl.classList.remove('visible');
  document.getElementById('svg-filename').textContent=`${name}  (${svgW_mm.toFixed(1)} × ${svgH_mm.toFixed(1)} mm)`;
  document.getElementById('btn-svg-generate').disabled=false;
  log(`SVG loaded: ${name} — ${svgW_mm.toFixed(2)}×${svgH_mm.toFixed(2)} mm`,'sys');
  document.querySelector('[data-tab="svg"]').click();
}

// ═══════════════════════════════════════════════════════════
// CANVAS RESIZE & RULER
// ═══════════════════════════════════════════════════════════
function resizeCanvas() {
  if (!svgW_mm) return;
  const wrap=document.getElementById('svg-canvas-wrap');
  const wW=wrap.clientWidth, wH=wrap.clientHeight;
  const ar=svgW_mm/svgH_mm;
  let dW, dH;
  if (ar>wW/wH) { dW=wW; dH=wW/ar; } else { dH=wH; dW=wH*ar; }
  svgBg.style.width=dW+'px'; svgBg.style.height=dH+'px';
  svgOverlay.width=dW; svgOverlay.height=dH;
  svgOverlay.style.width=dW+'px'; svgOverlay.style.height=dH+'px';
  canvasW=dW; canvasH=dH; svgScalePx=dW/svgW_mm;
  rulerH.width=dW; rulerH.height=28; rulerH.style.width=dW+'px';
  rulerV.width=28;  rulerV.height=dH; rulerV.style.height=dH+'px';
  drawRulers();
}

function drawRulers() {
  if (!svgW_mm) return;
  const TICK='#3a3a3a', LBL='#555', FONT='8px Courier New';

  const ctxH=rulerH.getContext('2d');
  ctxH.clearRect(0,0,rulerH.width,rulerH.height);
  ctxH.fillStyle='#0a0a0a'; ctxH.fillRect(0,0,rulerH.width,rulerH.height);
  ctxH.font=FONT; ctxH.fillStyle=LBL; ctxH.textAlign='center';
  const sH=pickRulerStep(svgW_mm,canvasW);
  for (let mm=0; mm<=svgW_mm+sH; mm+=sH/5) {
    const px=mm*svgScalePx; if(px>canvasW+1)break;
    const maj=Math.abs(mm%sH)<0.001;
    ctxH.strokeStyle=TICK; ctxH.lineWidth=maj?1:0.5;
    ctxH.beginPath(); ctxH.moveTo(px,maj?14:20); ctxH.lineTo(px,28); ctxH.stroke();
    if(maj) ctxH.fillText(mm.toFixed(0),px,11);
  }

  const ctxV=rulerV.getContext('2d');
  ctxV.clearRect(0,0,rulerV.width,rulerV.height);
  ctxV.fillStyle='#0a0a0a'; ctxV.fillRect(0,0,rulerV.width,rulerV.height);
  ctxV.font=FONT; ctxV.fillStyle=LBL; ctxV.textAlign='right';
  const sV=pickRulerStep(svgH_mm,canvasH);
  for (let mm=0; mm<=svgH_mm+sV; mm+=sV/5) {
    const py=canvasH-mm*svgScalePx; if(py<-1)break;
    const maj=Math.abs(mm%sV)<0.001;
    ctxV.strokeStyle=TICK; ctxV.lineWidth=maj?1:0.5;
    ctxV.beginPath(); ctxV.moveTo(maj?14:20,py); ctxV.lineTo(28,py); ctxV.stroke();
    if(maj){ ctxV.save(); ctxV.translate(11,py); ctxV.rotate(-Math.PI/2); ctxV.fillText(mm.toFixed(0),0,0); ctxV.restore(); }
  }
}

function pickRulerStep(totalMm, totalPx) {
  for (const s of [0.5,1,2,5,10,20,25,50,100,200,500]) if(s*totalPx/totalMm>=40) return s;
  return 500;
}

new ResizeObserver(()=>{ if(svgW_mm){ resizeCanvas(); drawAll(); } })
  .observe(document.getElementById('svg-canvas-wrap'));

// ═══════════════════════════════════════════════════════════
// CANVAS DRAW
// ═══════════════════════════════════════════════════════════
function mmToPx(mx,my) { return {x:mx*svgScalePx, y:canvasH-my*svgScalePx}; }
function drawAll() { drawRulers(); drawOverlay(); }

function drawOverlay() {
  if (!canvasW) return;
  const ctx=svgOverlay.getContext('2d');
  ctx.clearRect(0,0,canvasW,canvasH);

  // G-code path preview
  for (const seg of previewSegs) {
    if (!seg.pts.length) continue;
    ctx.beginPath();
    const p0=mmToPx(seg.pts[0].x,seg.pts[0].y);
    ctx.moveTo(p0.x,p0.y);
    for (let i=1;i<seg.pts.length;i++) { const p=mmToPx(seg.pts[i].x,seg.pts[i].y); ctx.lineTo(p.x,p.y); }
    if (seg.on) { ctx.strokeStyle='rgba(255,140,0,0.55)'; ctx.lineWidth=1.2; ctx.setLineDash([]); }
    else        { ctx.strokeStyle='rgba(70,70,70,0.3)';   ctx.lineWidth=0.7; ctx.setLineDash([4,4]); }
    ctx.stroke(); ctx.setLineDash([]);
  }

  // ── Laser cursor: glowing blue dot ──────────────────────
  const {x:cx, y:cy} = mmToPx(pos.x, pos.y);

  // outer glow rings
  const running = jobActive && !jobPaused;
  const glowColor = laserOn ? 'rgba(80,180,255,' : 'rgba(60,140,255,';

  ctx.save();
  // large diffuse glow
  ctx.shadowColor = laserOn ? 'rgba(50,180,255,0.9)' : 'rgba(40,120,255,0.6)';
  ctx.shadowBlur  = laserOn ? 22 : 14;
  ctx.beginPath(); ctx.arc(cx,cy, laserOn?7:5, 0, Math.PI*2);
  ctx.fillStyle = glowColor+(laserOn?'0.85)':'0.6)');
  ctx.fill();

  // bright core
  ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(cx,cy, laserOn?3:2.5, 0, Math.PI*2);
  ctx.fillStyle = laserOn ? 'rgba(200,240,255,1)' : 'rgba(150,200,255,0.9)';
  ctx.fill();
  ctx.restore();

  // thin crosshair (fine, no glow)
  ctx.strokeStyle = 'rgba(100,180,255,0.35)';
  ctx.lineWidth = 0.7;
  const rr=12;
  ctx.beginPath(); ctx.moveTo(cx-rr,cy); ctx.lineTo(cx+rr,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy-rr); ctx.lineTo(cx,cy+rr); ctx.stroke();

  // label
  ctx.font='9px Courier New';
  ctx.fillStyle='rgba(100,190,255,0.8)';
  ctx.fillText(`X${pos.x.toFixed(2)} Y${pos.y.toFixed(2)}`, cx+10, cy-6);
}

function trackSentGcode(cmd) {
  const u=cmd.toUpperCase();
  if (u.includes('M3')) laserOn=true;
  if (u.includes('M5')) laserOn=false;
  if (u.includes('G90')) posMode='abs';
  if (u.includes('G91')) posMode='rel';
  if (u.includes('G92')) { pos.x=0; pos.y=0; updatePosDisplay(); return; }
  const mx=u.match(/X([-\d.]+)/), my=u.match(/Y([-\d.]+)/);
  if (mx) pos.x=posMode==='abs'?parseFloat(mx[1]):pos.x+parseFloat(mx[1]);
  if (my) pos.y=posMode==='abs'?parseFloat(my[1]):pos.y+parseFloat(my[1]);
  if (mx||my) updatePosDisplay();
}

// ═══════════════════════════════════════════════════════════
// SVG → G-CODE CONVERSION
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-svg-generate').addEventListener('click', convertSvgToGcode);

async function convertSvgToGcode() {
  if (!svgDoc) return;

  const feed  = parseFloat(document.getElementById('p-feed').value)  || 800;
  const rapid = parseFloat(document.getElementById('p-rapid').value) || 3000;
  const power = parseInt  (document.getElementById('p-power').value) || 200;
  const scale = parseFloat(document.getElementById('p-scale').value) || 1;
  const step  = parseFloat(document.getElementById('p-step').value)  || 0.3;

  const liveSvgEl=svgDoc.documentElement.cloneNode(true);
  const vbStr=svgDoc.querySelector('svg').getAttribute('viewBox');
  const vbArr=(vbStr||'').trim().split(/[\s,]+/).map(Number);
  liveSvgEl.setAttribute('width', vbArr[2]??100);
  liveSvgEl.setAttribute('height',vbArr[3]??100);
  liveSvgEl.removeAttribute('style');
  const tmpDiv=document.createElement('div');
  tmpDiv.style.cssText='position:absolute;left:-99999px;top:-99999px;width:0;height:0;overflow:hidden';
  tmpDiv.appendChild(liveSvgEl);
  document.body.appendChild(tmpDiv);

  const vbW=vbArr[2]||100, vbH=vbArr[3]||100;
  const pxPerMm=vbW/svgW_mm;
  const shapes=Array.from(liveSvgEl.querySelectorAll('path,line,rect,circle,ellipse,polyline,polygon'));
  // allSegs: [{pts, color}]
  const allSegs=[];

  for (const origEl of shapes) {
    const segColor = getElementColor(origEl); // extract BEFORE converting
    let pathEl = origEl.tagName==='path' ? origEl : shapeToPath(origEl, origEl.parentElement||liveSvgEl);
    if (!pathEl) continue;
    const totalLen=pathEl.getTotalLength();
    if (totalLen<0.01) continue;
    const subpathFracs=findSubpathFractions(pathEl.getAttribute('d')||'');
    for (const {from,to} of subpathFracs) {
      const subLen=totalLen*(to-from);
      if (subLen<0.01) continue;
      const nSamples=Math.max(2,Math.ceil(subLen*pxPerMm*scale/step));
      const pts=[];
      const ctm=pathEl.getCTM();
      for (let i=0;i<=nSamples;i++) {
        const t=totalLen*(from+i/nSamples*(to-from));
        const raw=pathEl.getPointAtLength(t);
        const lp=liveSvgEl.createSVGPoint(); lp.x=raw.x; lp.y=raw.y;
        const vp=ctm?lp.matrixTransform(ctm):lp;
        pts.push({x:(vp.x/pxPerMm)*scale, y:((vbH-vp.y)/pxPerMm)*scale});
      }
      if (pts.length>=2) allSegs.push({pts, color: segColor});
    }
  }

  document.body.removeChild(tmpDiv);
  if (!allSegs.length) { log('No paths found in SVG.','err'); return; }

  // ── Check color profiles ──────────────────────────────────
  const unmatchedColors = new Set();
  if (profiles.length > 0) {
    for (const seg of allSegs) {
      if (!seg.color) { unmatchedColors.add('(no color)'); continue; }
      const found = profiles.find(p => p.color.toLowerCase() === seg.color.toLowerCase());
      if (!found) unmatchedColors.add(seg.color);
    }
    if (unmatchedColors.size > 0) {
      const list = [...unmatchedColors].join('\n  ');
      const ok = confirm(`⚠️ Paths with unmatched color profiles:\n  ${list}\n\nContinue with default values (F${feed} R${rapid} S${power})?`);
      if (!ok) { log('Generation cancelled — missing profiles.','sys'); return; }
    }
  }

  // offset to origin
  let minX=Infinity,minY=Infinity;
  for (const {pts} of allSegs) for (const p of pts){ if(p.x<minX)minX=p.x; if(p.y<minY)minY=p.y; }
  let maxX=0,maxY=0;
  for (const {pts} of allSegs) for (const p of pts){ p.x-=minX; p.y-=minY; if(p.x>maxX)maxX=p.x; if(p.y>maxY)maxY=p.y; }

  const lines=[
    `; SVG → G-code — ${document.getElementById('svg-filename').textContent}`,
    `; Dimensions: ${maxX.toFixed(2)} × ${maxY.toFixed(2)} mm`,
    '; Origin = SVG bottom-left corner',
    'G21','G90','M5',`G0 F${rapid}`,
  ];

  previewSegs=[]; let curX=0,curY=0;
  for (const {pts, color} of allSegs) {
    // Look up profile by color
    const prof = profiles.length>0 && color
      ? profiles.find(p=>p.color.toLowerCase()===color.toLowerCase())
      : null;
    const segFeed  = prof ? prof.feed  : feed;
    const segRapid = prof ? prof.rapid : rapid;
    const segPower = prof ? prof.power : power;

    const p0=pts[0];
    lines.push(`; color: ${color||'none'}${prof?' → profile match':' → default'}`);
    lines.push(`G0 F${segRapid}`);
    lines.push(`G0 X${fmt(p0.x)} Y${fmt(p0.y)}`);
    previewSegs.push({on:false,pts:[{x:curX,y:curY},p0]});
    lines.push(`M3 S${segPower}`,`G1 F${segFeed}`);
    const ep=[p0];
    for (let i=1;i<pts.length;i++){ lines.push(`G1 X${fmt(pts[i].x)} Y${fmt(pts[i].y)}`); ep.push(pts[i]); }
    lines.push('M5');
    previewSegs.push({on:true,pts:ep});
    curX=pts[pts.length-1].x; curY=pts[pts.length-1].y;
  }
  lines.push('M5','G0 X0.000 Y0.000','; End of program');

  log(`G-code generated: ${lines.length} lines, ${allSegs.length} segments, ${maxX.toFixed(1)}×${maxY.toFixed(1)} mm`,'sys');

  // Load G-code WITHOUT switching tab, then show SVG run controls
  parseAndRenderGcode(lines.join('\n'), 'da_svg.gcode', false);
  svgJobCtrl.classList.add('visible');
  setJobRunning(false); // reset button states
  drawAll();
}

function fmt(n) { return n.toFixed(3); }

function shapeToPath(el, parent) {
  const tag=el.tagName.toLowerCase(); let d='';
  if (tag==='line') {
    d=`M${el.getAttribute('x1')||0},${el.getAttribute('y1')||0} L${el.getAttribute('x2')||0},${el.getAttribute('y2')||0}`;
  } else if (tag==='rect') {
    const x=+el.getAttribute('x')||0,y=+el.getAttribute('y')||0,w=+el.getAttribute('width')||0,h=+el.getAttribute('height')||0,rx=+el.getAttribute('rx')||0;
    d=!rx?`M${x},${y} H${x+w} V${y+h} H${x} Z`:`M${x+rx},${y} H${x+w-rx} Q${x+w},${y} ${x+w},${y+rx} V${y+h-rx} Q${x+w},${y+h} ${x+w-rx},${y+h} H${x+rx} Q${x},${y+h} ${x},${y+h-rx} V${y+rx} Q${x},${y} ${x+rx},${y} Z`;
  } else if (tag==='circle') {
    const cx=+el.getAttribute('cx')||0,cy=+el.getAttribute('cy')||0,r=+el.getAttribute('r')||0;
    d=`M${cx-r},${cy} A${r},${r} 0 1,0 ${cx+r},${cy} A${r},${r} 0 1,0 ${cx-r},${cy} Z`;
  } else if (tag==='ellipse') {
    const cx=+el.getAttribute('cx')||0,cy=+el.getAttribute('cy')||0,rx=+el.getAttribute('rx')||0,ry=+el.getAttribute('ry')||0;
    d=`M${cx-rx},${cy} A${rx},${ry} 0 1,0 ${cx+rx},${cy} A${rx},${ry} 0 1,0 ${cx-rx},${cy} Z`;
  } else if (tag==='polyline'||tag==='polygon') {
    const pts=(el.getAttribute('points')||'').trim().split(/[\s,]+/);
    for(let i=0;i<pts.length;i+=2)d+=(i===0?'M':'L')+pts[i]+','+pts[i+1]+' ';
    if(tag==='polygon')d+='Z';
  }
  if (!d) return null;
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',d);
  const tx=el.getAttribute('transform'); if(tx)p.setAttribute('transform',tx);
  parent.appendChild(p); return p;
}

function findSubpathFractions(dStr) {
  const re=/[Mm]/g; const pos=[]; let m;
  while((m=re.exec(dStr))!==null) pos.push(m.index/dStr.length);
  if (pos.length<=1) return [{from:0,to:1}];
  return pos.map((f,i)=>({from:f,to:i+1<pos.length?pos[i+1]:1})).filter(r=>r.to-r.from>0.001);
}

// ═══════════════════════════════════════════════════════════
// COLOR PROFILES
// ═══════════════════════════════════════════════════════════
let profiles = [];
let nextPid  = 1;
let activeSwatchId = null;

function addProfile(data = {}) {
  const id = nextPid++;
  const p = { id, color: data.color||'#ff0000', feed: data.feed||800, rapid: data.rapid||3000, power: data.power||200 };
  profiles.push(p);
  renderProfileRow(p);
  return p;
}

function removeProfile(id) {
  profiles = profiles.filter(p=>p.id!==id);
  const el=document.getElementById(`prof-${id}`); if(el) el.remove();
}

function renderProfileRow(p) {
  const list=document.getElementById('profiles-list');
  const row=document.createElement('div');
  row.className='profile-row'; row.id=`prof-${p.id}`;
  row.innerHTML=`
    <div class="profile-swatch" id="sw-${p.id}" style="background:${p.color}" title="Click to pick color"></div>
    <span class="prof-lbl">F</span>
    <input class="prof-inp" id="pf-feed-${p.id}"  type="number" value="${p.feed}"  min="1" max="10000" title="Feed mm/min">
    <span class="prof-lbl">R</span>
    <input class="prof-inp" id="pf-rapid-${p.id}" type="number" value="${p.rapid}" min="1" max="10000" title="Rapid mm/min">
    <span class="prof-lbl">S</span>
    <input class="prof-inp" id="pf-power-${p.id}" type="number" value="${p.power}" min="0" max="255"   title="Laser power S">
    <button class="profile-del" data-id="${p.id}">✕</button>`;
  list.appendChild(row);

  document.getElementById(`sw-${p.id}`).addEventListener('click', e => openColorPicker(p.id, e.currentTarget));
  ['feed','rapid','power'].forEach(f => {
    document.getElementById(`pf-${f}-${p.id}`).addEventListener('change', e => {
      const pr=profiles.find(x=>x.id===p.id); if(pr) pr[f]=parseFloat(e.target.value)||0;
    });
  });
  row.querySelector('.profile-del').addEventListener('click', ()=>removeProfile(p.id));
}

// ── Color picker popup ─────────────────────────────────────
const cpPopup  = document.getElementById('color-picker-popup');
const cpNative = document.getElementById('cp-native');
const cpHex    = document.getElementById('cp-hex');
const cpR      = document.getElementById('cp-r');
const cpG      = document.getElementById('cp-g');
const cpB      = document.getElementById('cp-b');

function openColorPicker(profileId, anchor) {
  activeSwatchId = profileId;
  const pr = profiles.find(p=>p.id===profileId); if(!pr) return;
  setPickerColor(pr.color);
  const rect = anchor.getBoundingClientRect();
  const left = Math.min(rect.left, window.innerWidth-180);
  const top  = rect.bottom + 5;
  cpPopup.style.left = left+'px';
  cpPopup.style.top  = Math.min(top, window.innerHeight-160)+'px';
  cpPopup.classList.add('open');
}

document.addEventListener('click', e => {
  if (!cpPopup.classList.contains('open')) return;
  if (!cpPopup.contains(e.target) && !e.target.classList.contains('profile-swatch')) closeColorPicker();
}, true);

function closeColorPicker() { cpPopup.classList.remove('open'); activeSwatchId=null; }

function setPickerColor(hex) {
  const h = hex.replace('#','').toLowerCase().padEnd(6,'0');
  cpNative.value = '#'+h;
  cpHex.value = h.toUpperCase();
  cpR.value = parseInt(h.slice(0,2),16);
  cpG.value = parseInt(h.slice(2,4),16);
  cpB.value = parseInt(h.slice(4,6),16);
}

function applyPickerColor(hex) {
  if (!activeSwatchId) return;
  const pr = profiles.find(p=>p.id===activeSwatchId); if(!pr) return;
  pr.color = hex.toLowerCase();
  const sw = document.getElementById(`sw-${activeSwatchId}`); if(sw) sw.style.background=hex;
}

cpNative.addEventListener('input', () => {
  const h=cpNative.value.slice(1);
  cpHex.value=h.toUpperCase();
  cpR.value=parseInt(h.slice(0,2),16); cpG.value=parseInt(h.slice(2,4),16); cpB.value=parseInt(h.slice(4,6),16);
  applyPickerColor(cpNative.value);
});

cpHex.addEventListener('input', () => {
  const h=cpHex.value.replace(/[^0-9a-f]/gi,'');
  if (h.length!==6) return;
  const hex='#'+h.toLowerCase();
  cpNative.value=hex;
  cpR.value=parseInt(h.slice(0,2),16); cpG.value=parseInt(h.slice(2,4),16); cpB.value=parseInt(h.slice(4,6),16);
  applyPickerColor(hex);
});

function rgbChanged() {
  const r=Math.min(255,Math.max(0,parseInt(cpR.value)||0));
  const g=Math.min(255,Math.max(0,parseInt(cpG.value)||0));
  const b=Math.min(255,Math.max(0,parseInt(cpB.value)||0));
  const hex='#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
  cpNative.value=hex; cpHex.value=hex.slice(1).toUpperCase();
  applyPickerColor(hex);
}
cpR.addEventListener('input',rgbChanged); cpG.addEventListener('input',rgbChanged); cpB.addEventListener('input',rgbChanged);

// ── Save / Load ────────────────────────────────────────────
document.getElementById('btn-save-profiles').addEventListener('click', () => {
  const data=profiles.map(p=>({color:p.color,feed:p.feed,rapid:p.rapid,power:p.power}));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download='laser_profiles.json'; a.click(); URL.revokeObjectURL(a.href);
});

document.getElementById('btn-load-profiles').addEventListener('click',()=>document.getElementById('file-input-profiles').click());
document.getElementById('file-input-profiles').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const fr=new FileReader();
  fr.onload=ev=>{
    try {
      const data=JSON.parse(ev.target.result);
      document.getElementById('profiles-list').innerHTML='';
      profiles=[]; nextPid=1;
      data.forEach(d=>addProfile(d));
      log(`${data.length} profiles loaded.`,'sys');
    } catch(err){ log(`Profiles error: ${err.message}`,'err'); }
  };
  fr.readAsText(f); e.target.value='';
});

document.getElementById('btn-add-profile').addEventListener('click',()=>addProfile());

// ── Color helpers ─────────────────────────────────────────
function colorToHex(color) {
  if (!color||color==='none'||color==='inherit'||color==='currentColor') return null;
  try {
    const ctx=document.createElement('canvas').getContext('2d');
    ctx.fillStyle='#000000'; ctx.fillStyle=color;
    const h=ctx.fillStyle;
    if (h.startsWith('#')) return h.toLowerCase();
    const m=h.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
    if (m) return '#'+[m[1],m[2],m[3]].map(v=>parseInt(v).toString(16).padStart(2,'0')).join('');
  } catch(e){}
  return null;
}

function getElementColor(el) {
  // Walk up DOM tree looking for explicit stroke, fallback to fill
  let node=el;
  while (node&&node.tagName) {
    const style=node.getAttribute('style')||'';
    const sm=style.match(/(?:^|;)\s*stroke\s*:\s*([^;]+)/);
    if (sm){ const c=colorToHex(sm[1].trim()); if(c) return c; }
    const sa=node.getAttribute('stroke');
    if (sa&&sa!=='inherit'&&sa!=='currentColor'){ const c=colorToHex(sa); if(c) return c; }
    node=node.parentElement;
  }
  // fallback to fill
  node=el;
  while (node&&node.tagName) {
    const style=node.getAttribute('style')||'';
    const fm=style.match(/(?:^|;)\s*fill\s*:\s*([^;]+)/);
    if (fm&&fm[1].trim()!=='none'){ const c=colorToHex(fm[1].trim()); if(c) return c; }
    const fa=node.getAttribute('fill');
    if (fa&&fa!=='none'&&fa!=='inherit'&&fa!=='currentColor'){ const c=colorToHex(fa); if(c) return c; }
    node=node.parentElement;
  }
  return null;
}

// ═══════════════════════════════════════════════════════════
document.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('drop-overlay').classList.add('visible');});
document.addEventListener('dragleave',e=>{if(!e.relatedTarget)document.getElementById('drop-overlay').classList.remove('visible');});
document.addEventListener('drop',e=>{
  e.preventDefault(); document.getElementById('drop-overlay').classList.remove('visible');
  const f=e.dataTransfer.files[0]; if(!f) return;
  const fr=new FileReader();
  if(f.name.toLowerCase().endsWith('.svg')){ fr.onload=ev=>loadSvgText(ev.target.result,f.name); }
  else { fr.onload=ev=>parseAndRenderGcode(ev.target.result,f.name); }
  fr.readAsText(f);
});
